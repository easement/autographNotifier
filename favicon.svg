<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer vinyl -->
  <circle cx="16" cy="16" r="15" fill="#1a1a1a"/>
  <!-- Groove rings -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="11" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <circle cx="16" cy="16" r="9" fill="none" stroke="#2a2a2a" stroke-width="0.5"/>
  <!-- Label -->
  <circle cx="16" cy="16" r="7" fill="#F2E8D5"/>
  <!-- Label detail ring -->
  <circle cx="16" cy="16" r="6.5" fill="none" stroke="#C9B994" stroke-width="0.5"/>
  <!-- Center hole -->
  <circle cx="16" cy="16" r="1.5" fill="#1a1a1a"/>
  <!-- Small "A" autograph mark on label -->
  <text x="16" y="18.5" font-family="Georgia, serif" font-size="5" text-anchor="middle" fill="#B91C1C" font-style="italic">✦</text>
</svg>
